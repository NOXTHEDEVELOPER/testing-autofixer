name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        # Removed 'cache: 'npm'' because a lock file (e.g., package-lock.json) was not found.
        # To re-enable caching, ensure package-lock.json is committed to the repository.
    - name: Install dependencies
      run: npm ci
    - name: Run build
      run: npm run build --if-present
    - name: Run tests
      run: npm test
