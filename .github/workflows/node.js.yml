name: Node.js+CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm' # Caches npm dependencies to speed up builds

    - name: Install dependencies
      run: npm ci # 'npm ci' is preferred for CI environments for cleaner, reproducible installs

    - name: Run tests
      run: npm run test
