name: Node.js+CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        # The 'cache: npm' option was removed because a dependency lock file
        # (e.g., package-lock.json) was not found in the repository root.
        # This will prevent caching of node_modules, but allows the workflow to proceed.
        # To re-enable caching, ensure a valid lock file is committed to the repository.
    - name: Install dependencies
      run: npm ci
    - name: Build project
      run: npm run build
    - name: Run tests
      run: npm test
