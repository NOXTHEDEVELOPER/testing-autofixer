name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        node-version: [20.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        # The 'cache: npm' option was removed because a lock file (e.g., package-lock.json) was not found.
        # Once a lock file is committed to the repository, you can re-enable this line for caching.
        # cache: npm

    - name: Install dependencies
      run: npm install

    - name: Run tests (Example)
      run: npm test
      # Replace 'npm test' with your actual build/test commands

    # Add other build/test steps as needed
